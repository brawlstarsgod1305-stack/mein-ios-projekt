<div class="app-container" style="background: #0b141a; height: 100%; display: flex; flex-direction: column; color: white; font-family: sans-serif;">
    <!-- Header -->
    <div style="background: #1f2c33; padding: 45px 15px 10px; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.3);">
        <div style="width: 35px; height: 35px; background: #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
        <div>
            <div style="font-weight: bold; font-size: 16px;">Maxim</div>
            <div style="font-size: 11px; color: #00a884;">online</div>
        </div>
    </div>

    <!-- Chat Verlauf -->
    <div id="chat-flow" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: contain;">
        <div style="background: #1f2c33; padding: 8px 12px; border-radius: 10px; align-self: flex-start; max-width: 80%; font-size: 14px;">
            Hast du die Spiele schon getestet? 🐍
        </div>
    </div>

    <!-- Input Bereich -->
    <div style="background: #1f2c33; padding: 10px; display: flex; gap: 8px; align-items: center;">
        <input type="text" id="wa-input" placeholder="Nachricht" style="flex: 1; border: none; border-radius: 20px; padding: 10px 15px; background: #2a3942; color: white; outline: none;">
        <button onclick="sendWhatsAppMessage()" style="background: #00a884; border: none; width: 40px; height: 40px; border-radius: 50%; color: white; cursor: pointer;">➔</button>
    </div>
</div>

<script>
function sendWhatsAppMessage() {
    const input = document.getElementById('wa-input');
    const flow = document.getElementById('chat-flow');
    if(input.value.trim() !== "") {
        const msg = document.createElement('div');
        msg.style.cssText = "background: #005c4b; padding: 8px 12px; border-radius: 10px; align-self: flex-end; max-width: 80%; font-size: 14px; box-shadow: 0 1px 2px rgba(0,0,0,0.2);";
        msg.innerText = input.value;
        flow.appendChild(msg);
        input.value = "";
        flow.scrollTop = flow.scrollHeight;
    }
}
// Enter-Taste zum Senden
document.getElementById('wa-input').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendWhatsAppMessage(); });
</script>
