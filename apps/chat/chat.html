<div class="app-window" style="background: #0b141a; height: 100vh; display: flex; flex-direction: column; color: white; font-family: -apple-system, BlinkMacSystemFont, sans-serif;">
    
    <div style="background: #1f2c33; padding: 55px 15px 15px; display: flex; align-items: center; gap: 12px; border-bottom: 1px solid #2a3942;">
        <div style="width: 40px; height: 40px; background: #666; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 20px;">👤</div>
        <div style="flex: 1;">
            <div style="font-weight: bold; font-size: 16px;">Maxim</div>
            <div style="font-size: 12px; color: #00a884;">online</div>
        </div>
    </div>

    <div id="chat-messages" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background-image: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-size: cover;">
    </div>

    <div style="background: #1f2c33; padding: 15px; display: flex; gap: 10px; padding-bottom: 35px;">
        <input type="text" id="chat-input" placeholder="Nachricht" style="flex: 1; border: none; border-radius: 25px; padding: 12px 20px; background: #2a3942; color: white; outline: none; font-size: 16px;">
        <button onclick="sendMessage()" style="background: #00a884; border: none; width: 45px; height: 45px; border-radius: 50%; color: white; cursor: pointer; font-size: 20px;">➔</button>
    </div>
</div>

<script>
(function() {
    const msgBox = document.getElementById('chat-messages');
    const input = document.getElementById('chat-input');

    // Nachrichten aus dem Speicher laden
    const loadChat = () => {
        const history = localStorage.getItem('my_chat_history');
        if(history) {
            msgBox.innerHTML = history;
        } else {
            msgBox.innerHTML = '<div style="background: #1f2c33; padding: 10px; border-radius: 10px; align-self: flex-start; max-width: 80%;">Hey! Willkommen in deinem eigenen WhatsApp! 🚀</div>';
        }
        msgBox.scrollTop = msgBox.scrollHeight;
    };

    // Senden & Speichern
    window.sendMessage = () => {
        if(!input.value.trim()) return;
        
        const msgHtml = `<div style="background: #005c4b; padding: 10px; border-radius: 10px; align-self: flex-end; max-width: 80%; margin-bottom: 5px; box-shadow: 0 1px 2px rgba(0,0,0,0.3); animation: slideIn 0.2s ease-out;">${input.value}</div>`;
        
        msgBox.innerHTML += msgHtml;
        localStorage.setItem('my_chat_history', msgBox.innerHTML); // Speichern!
        input.value = "";
        msgBox.scrollTop = msgBox.scrollHeight;
    };

    // Enter-Taste zum Senden
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMessage(); });

    loadChat();
})();
</script>
