<div style="background: #0b141a; height: 100%; display: flex; flex-direction: column; color: white; font-family: sans-serif;">
    <div style="background: #1f2c33; padding: 55px 15px 15px; display: flex; align-items: center; gap: 10px;">
        <div style="width: 35px; height: 35px; background: #555; border-radius: 50%; display: flex; align-items: center; justify-content: center;">👤</div>
        <div style="flex:1"><strong>Maxim</strong><br><small style="color:#00a884">online</small></div>
    </div>

    <div id="msg-box" style="flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; background: url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png');">
    </div>

    <div style="background: #1f2c33; padding: 15px; display: flex; gap: 10px; padding-bottom: 30px;">
        <input type="text" id="wa-in" style="flex:1; border-radius:20px; border:none; padding:10px; background:#2a3942; color:white;" placeholder="Nachricht...">
        <button onclick="sendWA()" style="background:#00a884; border:none; border-radius:50%; width:40px; color:white;">➔</button>
    </div>
</div>

<script>
(function() {
    const box = document.getElementById('msg-box');
    const inp = document.getElementById('wa-in');

    const load = () => {
        box.innerHTML = localStorage.getItem('chat_save') || '<div style="background:#1f2c33; padding:10px; border-radius:10px; align-self:flex-start">Willkommen im Chat!</div>';
        box.scrollTop = box.scrollHeight;
    };

    window.sendWA = () => {
        if(!inp.value.trim()) return;
        box.innerHTML += `<div style="background:#005c4b; padding:10px; border-radius:10px; align-self:flex-end; margin-bottom:5px;">${inp.value}</div>`;
        localStorage.setItem('chat_save', box.innerHTML);
        inp.value = "";
        box.scrollTop = box.scrollHeight;
    };
    load();
})();
</script>
