<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>MyPhone OS</title>
    <link rel="stylesheet" href="style.css">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="manifest" href="manifest.json">
</head>
<body>

<div class="main-wrapper">
    <div class="phone">
        <div class="statusbar">
            <span id="time">00:00</span>
            <div class="status-right">📶 85% 🔋</div>
        </div>

        <div class="dynamic-island"></div>

        <div id="lockscreen">
            <div class="lock-content">
                <h1 id="lock-time-big">00:00</h1>
                <p>Donnerstag, 7. Mai</p>
                
                <div id="notification-container">
                    <div class="notification" onclick="event.stopPropagation(); openApp('whatsapp')">
                        <div class="notif-header">
                            <div class="notif-app-icon" style="background:#25D366">💬</div>
                            <span>WHATSAPP</span>
                            <span class="notif-time">jetzt</span>
                        </div>
                        <div class="notif-body">
                            <strong>Maxim</strong>
                            <p>Check mal die neuen Spiele aus! 🐍</p>
                        </div>
                    </div>
                </div>
                <div class="lock-msg">Zum Öffnen tippen</div>
            </div>
            <div class="lock-footer">
                <div class="quick-btn">🔦</div>
                <div class="quick-btn">📷</div>
            </div>
        </div>

        <div class="homescreen">
            <div class="app-grid">
                <div class="app-icon" onclick="openApp('whatsapp')">
                    <div class="icon-img" style="background:#25D366">💬</div>
                    <span>WhatsApp</span>
                </div>
                <div class="app-icon" onclick="openApp('games')">
                    <div class="icon-img" style="background:#5856D6">🎮</div>
                    <span>Spiele</span>
                </div>
                <div class="app-icon" onclick="openApp('browser')">
                    <div class="icon-img" style="background:#007AFF">🌐</div>
                    <span>Safari</span>
                </div>
                <div class="app-icon" onclick="openApp('camera')">
                    <div class="icon-img" style="background:#8e8e93">📷</div>
                    <span>Kamera</span>
                </div>
            </div>
        </div>

        <div id="app-viewport"></div>

        <div class="dock">
            <div class="dock-icon" onclick="openApp('whatsapp')">💬</div>
            <div class="dock-icon" onclick="openApp('browser')">🌐</div>
            <div class="dock-icon" onclick="openApp('snake')">🐍</div>
            <div class="dock-icon" onclick="openApp('tictactoe')">❌</div>
        </div>

        <div class="home-bar" id="home-bar" onclick="closeApp()"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
